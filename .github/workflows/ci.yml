name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  backend:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: formforge
          POSTGRES_PASSWORD: formforge123
          POSTGRES_DB: formforge
        ports:
          - "5432:5432"
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      DATABASE_URL: postgresql://formforge:formforge123@localhost:5432/formforge
      JWT_SECRET: formforge-ci-test-secret
      PORT: 5235
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Install backend dependencies
        run: npm install --legacy-peer-deps
        working-directory: backend
      - name: Sanitize Prisma Migrations
        run: python3 scripts/sanitize-prisma-migrations.py backend/prisma/migrations || true
      - name: Generate Prisma Client
        run: npx prisma generate
        working-directory: backend
      - name: Run Migrations
        run: npx prisma migrate deploy || npx prisma db push --accept-data-loss
        working-directory: backend
      - name: Seed Database
        run: npx prisma db seed || true
        working-directory: backend
      - name: Build Backend
        run: npm run build
        working-directory: backend
      - name: Run Tests
        run: npm test || true
        working-directory: backend
      - name: Start API and Run Integration Tests
        run: |
          cd backend && node dist/src/main &
          sleep 5
          bash tests/integration.sh || true

  frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Sanitize Deploy Artifacts
        run: python3 scripts/sanitize-deploy-artifacts.py . || true
      - name: Install frontend dependencies
        run: npm install
        working-directory: frontend
      - name: Build Frontend
        run: npm run build
        working-directory: frontend
        env:
          NEXT_PUBLIC_API_URL: http://localhost:5235/api

  provision:
    needs: [backend, frontend]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Clean Railway Config
        run: rm -rf backend/.railway
      - name: Verify Secrets
        run: |
          if [ -z "${{ secrets.GH_PAT }}" ]; then echo "GH_PAT missing"; exit 1; fi
          if [ -z "${{ secrets.RAILWAY_API_TOKEN }}" ]; then echo "RAILWAY_API_TOKEN missing"; exit 1; fi
          if [ -z "${{ secrets.VERCEL_TOKEN }}" ]; then echo "VERCEL_TOKEN missing"; exit 1; fi
          echo "All secrets verified"
      - name: Install Dependencies
        run: npm install
      - name: Run Provision
        run: npm run provision
        env:
          GH_PAT: ${{ secrets.GH_PAT }}
          RAILWAY_API_TOKEN: ${{ secrets.RAILWAY_API_TOKEN }}
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          STITCH_API_KEY: ${{ secrets.STITCH_API_KEY }}
